<script type="module">
  import { auth } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMS-d5nJ8LcIxJrpUU9k0tniF7iyUHnJs",
    authDomain: "crush-app-3567b.firebaseapp.com",
    projectId: "crush-app-3567b",
    storageBucket: "crush-app-3567b.firebasestorage.app",
    messagingSenderId: "1049760010611",
    appId: "1:1049760010611:web:2e835a0dafa23455ceb506"
  };

  const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
  const db = getFirestore(app);

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
    } else {
      currentUser = user;
    }
  });

  document.getElementById('generateBtn').addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const dob = document.getElementById('dob').value;
    const crushName = document.getElementById('crushName').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    if (!name || !dob || !crushName) {
      errorMsg.textContent = 'Please fill all fields.';
      errorMsg.style.display = 'block';
      return;
    }

    errorMsg.style.display = 'none';
    document.getElementById('generateBtn').textContent = 'Generating... 💭';
    document.getElementById('generateBtn').disabled = true;

    try {
      // Get result from backend
      const response = await fetch('https://crush-app-backend.onrender.com/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          dob,
          crushName,
          userID: currentUser.uid
        })
      });

      const data = await response.json();

      if (data.success) {
        // Save to Firestore directly from frontend
        await setDoc(doc(db, 'results', currentUser.uid), {
          userID: currentUser.uid,
          name,
          dob,
          crushName,
          result: data.result,
          createdAt: new Date().toISOString()
        });

        // Save in session and redirect
        sessionStorage.setItem('crushResult', data.result);
        sessionStorage.setItem('crushName', crushName);
        window.location.href = 'result.html';

      } else {
        errorMsg.textContent = data.error || 'Something went wrong.';
        errorMsg.style.display = 'block';
      }

    } catch (err) {
      console.error(err);
      errorMsg.textContent = 'Error: ' + err.message;
      errorMsg.style.display = 'block';
    }

    document.getElementById('generateBtn').textContent = 'Reveal Their Thoughts 💕';
    document.getElementById('generateBtn').disabled = false;
  });
</script>
