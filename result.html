<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Their Thoughts — Crush Thoughts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <span style="font-size:2.5rem;">💝</span>
    <h2>Here's What They Think...</h2>
    <p class="subtitle" id="crushLabel"></p>
    <div class="result-card" id="resultText">
      <p style="color:#e91e8c;">Loading... 💭</p>
    </div>
    <button class="btn btn-secondary" onclick="handleLogout()">
      Logout
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMS-d5nJ8LcIxJrpUU9k0tniF7iyUHnJs",
      authDomain: "crush-app-3567b.firebaseapp.com",
      projectId: "crush-app-3567b",
      storageBucket: "crush-app-3567b.firebasestorage.app",
      messagingSenderId: "1049760010611",
      appId: "1:1049760010611:web:2e835a0dafa23455ceb506"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const resultBox = document.getElementById('resultText');
      const crushLabel = document.getElementById('crushLabel');

      // Check sessionStorage first (just came from form)
      const sessionResult = sessionStorage.getItem('crushResult');
      const sessionCrush = sessionStorage.getItem('crushName');

      if (sessionResult) {
        crushLabel.textContent = `About ${sessionCrush} 💕`;
        resultBox.textContent = sessionResult;
        sessionStorage.removeItem('crushResult');
        sessionStorage.removeItem('crushName');
        return;
      }

      // Load from Firebase (returning user)
      try {
        const snap = await getDoc(doc(db, 'results', user.uid));
        if (snap.exists()) {
          const data = snap.data();
          crushLabel.textContent = `About ${data.crushName} 💕`;
          resultBox.textContent = data.result;
        } else {
          resultBox.innerHTML = '<p>No result found. <a href="form.html">Fill the form!</a></p>';
        }
      } catch (err) {
        resultBox.textContent = 'Error loading result. Please try again.';
      }
    });

    window.handleLogout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>
